<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TrainerHub | בונה אימון</title><style>
:root{--bg:#101312;--card:#1a1f1d;--line:#303834;--ink:#f6f8f6;--muted:#a7b1ab;--lime:#b9f24a}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#101312,#17221c);color:var(--ink);font-family:Arial,sans-serif;min-height:100vh}.wrap{max-width:1000px;margin:auto;padding:42px 20px}.top{margin-bottom:24px}.top small{color:var(--lime);font-weight:bold}.top h1{font-size:clamp(2.2rem,6vw,4rem);margin:8px 0}.top p{color:var(--muted)}.layout{display:grid;grid-template-columns:320px 1fr;gap:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px}label{display:block;color:var(--muted);font-size:.84rem;margin:13px 0 6px}select,input{width:100%;padding:11px;border-radius:9px;border:1px solid var(--line);background:#111513;color:var(--ink);font:inherit}button{width:100%;padding:13px;margin-top:18px;border:0;border-radius:10px;background:var(--lime);color:#101312;font-weight:900;cursor:pointer}.summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}.pill{background:#26302b;border-radius:10px;padding:10px 13px;color:var(--muted)}.pill b{color:var(--ink)}.day{border-top:1px solid var(--line);padding:16px 0}.day:first-of-type{border:0}.exercise{display:grid;grid-template-columns:1fr auto;gap:5px;padding:9px 0}.exercise span{color:var(--muted);font-size:.83rem}.error{color:#ff9d9d}@media(max-width:700px){.layout{grid-template-columns:1fr}}
</style></head><body><main class="wrap"><header class="top"><small>TRAINERHUB / PROGRAM BUILDER</small><h1>האימון הבא שלך, מוכן.</h1><p>תוכנית קצרה המותאמת למטרות, לרמת הכושר, לציוד ולאזורים שתרצו לאמן.</p></header><section class="layout"><form class="card" id="form"><h2>העדפות מתאמן</h2><label>קבוצת שרירים מרכזית</label><select id="muscle"><option value="legs">רגליים</option><option value="chest">חזה</option><option value="back">גב</option><option value="shoulders">כתפיים</option><option value="core">ליבה</option></select><label>מטרה</label><select id="goal"><option value="strength">כוח</option><option value="general_fitness">כושר כללי</option><option value="muscle_gain">עלייה במסת שריר</option></select><label>רמה</label><select id="level"><option value="beginner">מתחילים</option><option value="intermediate">ביניים</option><option value="advanced">מתקדמים</option></select><label>ציוד</label><select id="equipment"><option value="none">משקל גוף</option><option value="dumbbells">משקולות</option></select><label>ימי אימון בשבוע</label><input id="days" type="number" min="1" max="5" value="3"><button>בנה אימון</button></form><div class="card" id="result"></div></section></main><script>
/*__LIB_BUNDLE__*/
const Hub={...__require('lib/generateWorkoutProgram.js'),...__require('lib/filterExercises.js'),...__require('lib/workoutVolume.js')};
const names={squat:'סקוואט',deadlift:'דדליפט',lunges:'מכרעים',leg_press:'לחיצת רגליים',bodyweight_squat:'סקוואט משקל גוף',glute_bridge:'גשר ישבן',step_up:'עליית מדרגה',bench_press:'לחיצת חזה',push_up:'שכיבות סמיכה',plank:'פלאנק',crunches:'כפיפות בטן',barbell_row:'חתירה',pull_up:'מתח',superman:'סופרמן'};const $=x=>document.getElementById(x),esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));function run(e){if(e)e.preventDefault();try{const muscle=$('muscle').value,eq=$('equipment').value;const profile={age:31,gender:'other',fitnessLevel:$('level').value,goals:[$('goal').value],availableEquipment:[eq],injuries:['chest','back','shoulders','biceps','triceps','legs','core'].filter(x=>x!==muscle),previousWorkouts:8};const p=Hub.generateWorkoutProgram(profile,1,Number($('days').value));const sets=p.dailyWorkouts.flatMap(d=>d.exercises.map(x=>({reps:Number(x.reps.split('-')[0]),weightKg:eq==='none'?0:12})));$('result').innerHTML=`<div class="summary"><div class="pill"><b>${p.dailyWorkouts.length}</b> אימונים</div><div class="pill"><b>${p.dailyWorkouts[0]?.exercises.length||0}</b> תרגילים באימון</div><div class="pill"><b>${Hub.workoutVolume(sets)}</b> ק״ג נפח משוער</div></div>${p.dailyWorkouts.map(d=>`<section class="day"><h3>אימון ${d.day}</h3><div class="exercise"><b>חימום: ${esc(names[d.warmUp]||d.warmUp.replaceAll('_',' '))}</b><span>הכנה</span></div>${d.exercises.map(x=>`<div class="exercise"><b>${esc(names[x.name]||x.name.replaceAll('_',' '))}</b><span>${x.sets} סטים · ${x.reps} חזרות · ${x.restSeconds} שנ׳</span></div>`).join('')}<div class="exercise"><b>שחרור: ${esc(d.coolDown.replaceAll('_',' '))}</b><span>סיום</span></div></section>`).join('')}`}catch(err){$('result').innerHTML=`<p class="error">${esc(err.message)}</p>`}}$('form').addEventListener('submit',run);run();
</script></body></html>
